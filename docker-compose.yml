version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: vi-notes-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - vi-notes-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vi-notes-backend
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/vi-notes?authSource=admin
      - JWT_SECRET=your_jwt_secret_key_here_change_in_production
      - NODE_ENV=development
    depends_on:
      - mongodb
    networks:
      - vi-notes-network
    volumes:
      - ./backend/src:/app/src

volumes:
  mongodb_data:

networks:
  vi-notes-network:
    driver: bridge
